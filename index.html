<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#090b12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pocket Piano" />
  <title>Pocket Piano</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css?v=compact-1" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar glass">
      <section class="brand">
        <div class="logo">♪</div>
        <div>
          <h1>Pocket Piano</h1>
          <p>Piano acústico web</p>
        </div>
      </section>
      <section class="controls">
        <button class="pill" id="octaveDown" aria-label="Bajar octava">−</button>
        <div class="readout"><span>Octavas</span><strong id="octaveLabel">C3–B6</strong></div>
        <button class="pill" id="octaveUp" aria-label="Subir octava">+</button>
        <label class="slider-wrap"><span>Vol</span><input id="volume" type="range" min="0" max="1" value="0.72" step="0.01" /></label>
        <button class="pill wide" id="sustainBtn" aria-pressed="false">Sustain</button>
        <button class="pill wide" id="fullscreenBtn">Pantalla</button>
      </section>
    </header>

    <section class="stage">
      <div class="hint glass" id="hint">Toca varias teclas a la vez. En móvil usa horizontal para más octavas.</div>
      <div class="piano-frame glass">
        <div class="piano" id="piano" aria-label="Piano multitáctil" role="application"></div>
      </div>
    </section>
  </main>
  <script src="script.js?v=compact-1"></script>
</body>
</html>
