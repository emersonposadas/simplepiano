<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pocket Piano" />
  <title>Pocket Piano</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css?v=thirds-ui" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="app-icon" aria-hidden="true">♪</div>
        <div>
          <h1>Pocket Piano</h1>
          <p id="statusText">Listo para tocar</p>
        </div>
      </div>

      <div class="top-actions">
        <button id="installBtn" class="pill-btn" type="button" hidden>Instalar</button>
        <button id="fullscreenBtn" class="round-btn" type="button" aria-label="Pantalla completa">⛶</button>
      </div>
    </header>

    <section class="control-grid" aria-label="Controles del piano">
      <div class="control-card octave-card">
        <button id="octaveDown" class="step-btn" type="button" aria-label="Bajar octava">−</button>
        <div class="control-center">
          <span class="label">Octava</span>
          <strong id="octaveValue">C3</strong>
        </div>
        <button id="octaveUp" class="step-btn" type="button" aria-label="Subir octava">+</button>
      </div>

      <label class="control-card select-card">
        <span class="label">Rango</span>
        <select id="rangeSelect" aria-label="Seleccionar rango de octavas">
          <option value="2">2 octavas</option>
          <option value="3" selected>3 octavas</option>
          <option value="4">4 octavas</option>
          <option value="5">5 octavas</option>
        </select>
      </label>

      <label class="control-card select-card">
        <span class="label">Sonido</span>
        <select id="toneSelect" aria-label="Seleccionar tipo de sonido">
          <option value="soft" selected>Suave</option>
          <option value="bright">Brillante</option>
          <option value="warm">Cálido</option>
        </select>
      </label>

      <div class="control-card thirds-card">
        <span class="label">Terceras</span>
        <button id="thirdSwitch" class="third-switch" type="button" aria-label="Cambiar modo de terceras" aria-live="polite" data-mode="0">
          <span id="thirdSwitchText">Neutral</span>
        </button>
      </div>

      <label class="control-card volume-card">
        <span class="label">Volumen</span>
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.72" aria-label="Volumen" />
      </label>
    </section>

    <section class="play-header">
      <h2 id="noteDisplay">Toca una tecla</h2>
      <p>Multitáctil · Responsive · GitHub Pages</p>
    </section>

    <main class="piano-stage">
      <div id="keyboard" class="keyboard" aria-label="Teclado de piano" role="application"></div>
    </main>

    <footer class="hintbar">
      <span>Teclado físico: A W S E D F T G Y H U J K O L P Ñ · Terceras: abajo / neutral / arriba</span>
      <span>Gira el móvil para más teclas visibles.</span>
    </footer>
  </div>

  <script src="script.js?v=thirds-ui" defer></script>
</body>
</html>
